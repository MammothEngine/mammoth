<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mammoth Engine - MongoDB-Compatible Document Database</title>
    <meta name="description" content="Mammoth Engine is a high-performance, embeddable document database with MongoDB wire protocol compatibility. Built for speed, scale, and simplicity." />
    <meta name="keywords" content="database, mongodb, document database, go, golang, lsm-tree, raft, replication" />
    <meta name="author" content="Mammoth Engine Team" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://mammothengine.com" />
    <meta property="og:title" content="Mammoth Engine - MongoDB-Compatible Document Database" />
    <meta property="og:description" content="High-performance, embeddable document database with MongoDB wire protocol compatibility" />

    <!-- Theme Color -->
    <meta name="theme-color" content="#0ea5e9" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#0c4a6e" media="(prefers-color-scheme: dark)" />

    <!-- SPA GitHub Pages Redirect -->
    <script type="text/javascript">
      (function(l) {
        if (l.search[1] === '/' ) {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
              l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
