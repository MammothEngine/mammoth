# Mammoth Engine Configuration
# See docs for full reference.

[server]
port = 27017
bind = "0.0.0.0"
data-dir = "./data"
log-level = "info"              # debug | info | warn | error

[server.tls]
cert-file = ""
key-file = ""

[server.admin]
port = 8081

[server.metrics]
port = 9100

[server.auth]
enabled = false

[engine]
memtable-size = 67108864        # 64MB
cache-size = 134217728          # 128MB
compaction-threads = 2
wal-sync-mode = "full"          # full | batch | none
slow-query-threshold = "100ms"

[replication]
enabled = false
node-id = 1
